name: Storybook

on:
  push:
    branches: [main, develop]
    paths:
      - "talent-tool-mvp/frontend/**"
      - "talent-tool-mvp/frontend/.storybook/**"
      - ".github/workflows/storybook.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "talent-tool-mvp/frontend/**"
      - "talent-tool-mvp/frontend/.storybook/**"
      - ".github/workflows/storybook.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: talent-tool-mvp/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: talent-tool-mvp/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Upload Storybook static
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: talent-tool-mvp/frontend/storybook-static
          retention-days: 14
          if-no-files-found: warn