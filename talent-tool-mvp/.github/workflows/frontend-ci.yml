name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Lint + Type-check + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm exec tsc --noEmit
      - name: Test (Vitest)
        run: pnpm exec vitest run --reporter=verbose
      - name: Build
        run: pnpm build

  a11y-lighthouse:
    name: A11y + SEO + Performance audit (Lighthouse + axe-core)
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright + axe-core
        run: |
          pnpm add -D @axe-core/playwright playwright
          pnpm exec playwright install --with-deps chromium

      - name: Build app for static export
        run: pnpm build

      - name: Serve built artifacts
        run: |
          pnpm exec next start -p 4173 &
          sleep 8

      - name: Run axe-core against every route
        env:
          BASE_URL: http://localhost:4173
        run: |
          cat > /tmp/axe-runner.mjs <<'EOF'
          import { chromium } from "playwright";
          import AxeBuilder from "@axe-core/playwright";
          import fs from "node:fs";

          const routes = [
            "/",
            "/legal/privacy",
            "/legal/terms",
            "/legal/cookies",
            "/legal/dpa",
          ];
          const base = process.env.BASE_URL;
          const out = { critical: 0, serious: 0, moderate: 0, minor: 0, byRoute: {} };
          const browser = await chromium.launch();
          const ctx = await browser.newContext();
          for (const path of routes) {
            const page = await ctx.newPage();
            await page.goto(base + path, { waitUntil: "networkidle" });
            const results = await new AxeBuilder({ page })
              .withTags(["wcag2a", "wcag2aa", "wcag21a", "wcag21aa"])
              .analyze();
            let r = { critical: 0, serious: 0, moderate: 0, minor: 0 };
            for (const v of results.violations) {
              r[v.impact || "minor"] += 1;
              out[v.impact || "minor"] += 1;
            }
            out.byRoute[path] = { ...r, violations: results.violations.map(v => ({ id: v.id, impact: v.impact, help: v.help })) };
            await page.close();
          }
          await browser.close();
          fs.writeFileSync("axe-report.json", JSON.stringify(out, null, 2));
          console.log(JSON.stringify(out, null, 2));
          if (out.critical > 0) {
            console.error("Critical axe violations found; failing build.");
            process.exit(1);
          }
          EOF
          node /tmp/axe-runner.mjs

      - name: Run Lighthouse (a11y + seo budgets)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true

  global-search-perf:
    name: Global search latency budget (<500ms)
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - name: Performance smoke (global search bar)
        run: pnpm exec vitest run tests/test_search.spec.ts --reporter=verbose
