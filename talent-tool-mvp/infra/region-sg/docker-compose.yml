# =============================================================================
# waibao 新加坡区域 (region-sg) — 海外 / Supabase Singapore
# T1503 多区域部署
# =============================================================================
# 依赖托管服务:
#   - Supabase Singapore (Postgres + Auth + Realtime + Storage)
#   - AWS Singapore: RDS PostgreSQL (只读副本, 同步 region-cn 主)
#   - AWS ElastiCache Singapore (Redis 7.0)
#   - AWS ALB → EKS
#   - Cloudflare (DNS + WAF) — 海外解析 → region-sg / region-us
#
# 此 docker-compose 用于本地 / staging 模拟海外部署
# 生产以 k8s/ + terraform/ 为准
# =============================================================================

version: "3.9"

x-common-env: &common-env
  ENV: production
  REGION: sg
  DATA_RESIDENCY: sg
  DEFAULT_LOCALE: en
  PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY}
  GDPR_DPO_CONTACT: dpo@waibao.io
  TZ: Asia/Singapore

services:
  backend:
    <<: *common-env
    build: ../../backend
    image: waibao/backend:v4.0.0-sg
    container_name: waibao-sg-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${SUPABASE_SG_URL}     # Supabase 主
      - READONLY_DATABASE_URL=${RDS_SG_RO_URL}  # 跨区域副本
      - REDIS_URL=${ELASTICACHE_SG_URL}
      - SUPABASE_URL=${SUPABASE_SG_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - ZOOM_API_KEY=${ZOOM_API_KEY}
      - ZOOM_API_SECRET=${ZOOM_API_SECRET}
      - GREENHOUSE_API_KEY=${GREENHOUSE_API_KEY}
      - CHECKR_API_KEY=${CHECKR_API_KEY}
      - CORS_ORIGINS=https://waibao.io,https://www.waibao.io,https://sg.waibao.io
      - REGION_ROUTING_PRIMARY=sg
      - REGION_ROUTING_REPLICAS=us,cn
      - COOKIE_DOMAIN=.waibao.io
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 2048M }
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "10" }
    networks: [waibao-sg-net]

  frontend:
    <<: *common-env
    build: ../../frontend
    image: waibao/frontend:v4.0.0-sg
    container_name: waibao-sg-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.sg.waibao.io
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_SG_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_REGION=sg
      - NEXT_PUBLIC_LOCALE_DEFAULT=en
      - NEXT_PUBLIC_GA_ID=${GA_ID_SG}
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN_SG}
    depends_on:
      backend: { condition: service_healthy }
    networks: [waibao-sg-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: waibao-sg-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks: [waibao-sg-net]

networks:
  waibao-sg-net:
    driver: bridge
