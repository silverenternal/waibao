global:
  resolve_timeout: 5m

route:
  receiver: "dingtalk-team"
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

  routes:
    - match:
        severity: critical
      receiver: "dingtalk-oncall"
      continue: true

receivers:
  - name: "dingtalk-team"
    webhook_configs:
      - url: "${DINGTALK_WEBHOOK_URL}"
        send_resolved: true

  - name: "dingtalk-oncall"
    webhook_configs:
      - url: "${DINGTALK_ONCALL_WEBHOOK_URL}"
        send_resolved: true

# 告警规则
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]