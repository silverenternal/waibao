apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "waibao.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: {{ include "waibao.name" . }}
    app.kubernetes.io/component: frontend
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "waibao.name" . }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "waibao.name" . }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://{{ .Values.whitelabel.domain }}/api"
            - name: NEXT_PUBLIC_DEPLOYMENT_MODE
              value: private
            - name: NEXT_PUBLIC_TENANT_ID
              value: {{ .Values.whitelabel.tenantId | quote }}
            - name: NEXT_PUBLIC_PRODUCT_NAME
              value: {{ .Values.whitelabel.productName | quote }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}