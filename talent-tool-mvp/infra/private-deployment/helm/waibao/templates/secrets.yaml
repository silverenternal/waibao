# Secret template — generated by helm install via --set, or created
# manually before install (recommended for production).
#
# kubectl create secret generic waibao-secrets \
#   --from-literal=database-url='postgresql+psycopg://...' \
#   --from-literal=redis-url='redis://...' \
#   --from-literal=clickhouse-url='http://...' \
#   --from-literal=qdrant-url='http://...' \
#   --from-literal=secret-key='$(openssl rand -base64 48)'
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "waibao.fullname" . }}-secrets
  labels:
    {{- include "waibao.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  redis-url: {{ .Values.secrets.redisUrl | quote }}
  clickhouse-url: {{ .Values.secrets.clickhouseUrl | quote }}
  qdrant-url: {{ .Values.secrets.qdrantUrl | quote }}
  secret-key: {{ .Values.secrets.secretKey | quote }}
{{- end }}