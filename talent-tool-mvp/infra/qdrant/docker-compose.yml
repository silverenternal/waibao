# T2701: Qdrant vector DB for RAG
#
# Run:    docker compose -f infra/qdrant/docker-compose.yml up -d
# Stop:   docker compose -f infra/qdrant/docker-compose.yml down
# Health: curl http://localhost:6333/healthz

version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: waibao_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"     # HTTP API
      - "6334:6334"     # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
