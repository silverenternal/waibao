# =============================================================================
# waibao us - Backend Deployment (AWS EKS us-west-1)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: waibao-us-backend
  namespace: waibao-us
  labels: { app: waibao-us-backend, region: us, version: v4.0.0 }
spec:
  replicas: 3
  selector:
    matchLabels: { app: waibao-us-backend }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: waibao-us-backend, region: us }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector:
                  matchLabels: { app: waibao-us-backend }
      containers:
        - name: backend
          image: waibao/backend:v4.0.0-us
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000, name: http }]
          env:
            - { name: ENV, value: "production" }
            - { name: REGION, value: "us" }
            - { name: DATA_RESIDENCY, value: "us" }
            - { name: DEFAULT_LOCALE, value: "en" }
            - { name: REGION_ROUTING_PRIMARY, value: "us" }
            - { name: REGION_ROUTING_REPLICAS, value: "sg,cn" }
            - { name: DATABASE_URL, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: supabase-url } } }
            - { name: READONLY_DATABASE_URL, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: rds-us-ro-url } } }
            - { name: REDIS_URL, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: elasticache-url } } }
            - { name: SUPABASE_URL, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: supabase-url } } }
            - { name: SUPABASE_SERVICE_KEY, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: supabase-service-key } } }
            - { name: SUPABASE_JWT_SECRET, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: supabase-jwt-secret } } }
            - { name: OPENAI_API_KEY, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: openai-key } } }
            - { name: ANTHROPIC_API_KEY, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: anthropic-key } } }
            - { name: STRIPE_SECRET_KEY, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: stripe-key } } }
            - { name: ZOOM_API_KEY, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: zoom-key } } }
            - { name: ZOOM_API_SECRET, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: zoom-secret } } }
            - { name: GREENHOUSE_API_KEY, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: greenhouse-key } } }
            - { name: LEVER_API_KEY, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: lever-key } } }
            - { name: CHECKR_API_KEY, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: checkr-key } } }
            - { name: PII_ENCRYPTION_KEY, valueFrom: { secretKeyRef: { name: waibao-us-secrets, key: pii-key } } }
            - { name: CCPA_ENABLED, value: "true" }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "2Gi" }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: waibao-us-backend
  namespace: waibao-us
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
  selector: { app: waibao-us-backend }

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: waibao-us-backend-hpa
  namespace: waibao-us
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: waibao-us-backend
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
