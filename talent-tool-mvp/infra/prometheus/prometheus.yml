global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: waibao-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: waibao-backend
          env: production

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]