name: dingtalk-approval
version: 0.9.0
author: waibao-labs
description: Bridges offer / hire approvals into DingTalk approval workflow
entry_point: main:DingTalkApprovalPlugin
type: provider
permissions:
  - http:call
  - events:emit
  - metrics:emit
config_schema:
  app_key:
    type: string
    default: ""
  app_secret:
    type: string
    default: ""
  approval_code:
    type: string
    default: ""
  default_approver_userid:
    type: string
    default: ""
dependencies: []