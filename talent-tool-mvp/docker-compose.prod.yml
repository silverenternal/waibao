version: "3.9"

# ============================================================
# 生产部署 (T404)
# ============================================================

services:
  api:
    build: ./backend
    container_name: recruittech-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PII_ENCRYPTION_KEY=${PII_ENCRYPTION_KEY}
      - DEFAULT_LOCALE=zh
      - CORS_ORIGINS=${CORS_ORIGINS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
    networks:
      - recruittech-net

  frontend:
    build: ./frontend
    container_name: recruittech-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.your-domain.com
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY}
    depends_on:
      - api
    networks:
      - recruittech-net

  prometheus:
    image: prom/prometheus:latest
    container_name: recruittech-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
    networks:
      - recruittech-net

  grafana:
    image: grafana/grafana:latest
    container_name: recruittech-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./infra/grafana-dashboard.json:/var/lib/grafana/dashboards/recruittech.json
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - recruittech-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: recruittech-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - recruittech-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  recruittech-net:
    driver: bridge