site_name: 招聘智能体
site_description: v10.0 - 企业化硬化 (强契约 Agent Gateway + RLS 多租户 + PII/KMS + GDPR/PIPL/CCPA + 真实模型 AI 子系统)
site_author: waibao

repo_name: silverenternal/waibao
repo_url: https://github.com/silverenternal/waibao
edit_uri: edit/master/

docs_dir: docs

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 跟随系统
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 浅色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 深色模式
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - 首页: README.md
  - 架构: ARCHITECTURE.md
  - AI 能力深解: AI_DEEP.md
  - 智能体: AGENTS.md
  - API: API.md
  - Providers & 横切能力: PROVIDERS.md
  - 多区域部署: MULTI_REGION.md
  - 灾备: DISASTER_RECOVERY.md
  - 运维手册: RUNBOOK.md
  - 性能压测: PERFORMANCE.md
  - 安全策略: SECURITY.md
  - 隐私合规 (GDPR/PIPL/CCPA): COMPLIANCE.md
  - 发布记录:
      - v10.0.0 (企业化硬化): releases/v10.0.0.md
      - v9.1.0: releases/v9.1.0.md
      - v9.0.0: releases/v9.0.0.md
      - v8.1.0: releases/v8.1.0.md
      - v8.0.0: releases/v8.0.0.md
      - v7.0.0: releases/v7.0.0.md
      - v5.0.0: releases/v5.0.0.md
      - v4.0.0: releases/v4.0.0.md
  - i18n 指南: I18N_GUIDE.md
  - 覆盖审计 v3: COVERAGE-AUDIT-v3.md
  - 覆盖审计 v4: COVERAGE-AUDIT-v4.md
  - 部署: DEPLOYMENT.md
  - 私有化 + 白标: PRIVATE_DEPLOYMENT.md
  - 开源选型: VENDOR_SELECTION.md
  - 前端选型 ADR (v9.0): FRONTEND_SELECTION.md
  - 组件目录: COMPONENTS.md
  - 跨端一致性: CROSS_END_CONSISTENCY.md
  - 性能与 Lighthouse: PERFORMANCE_LIGHTHOUSE.md
  - 商业化与合规: COMMERCIAL.md
  - 服务开关规格: SERVICE_TOGGLE_SPEC.md
  - 路线图: ROADMAP.md
  - 贡献指南: CONTRIBUTING.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/silverenternal/waibao